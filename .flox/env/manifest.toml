version = 1

[install]
python312.pkg-path = "python312"
uv.pkg-path = "uv"

[vars]
# All user-tunable vars live in [hook.on-activate] with ${VAR:-default}
# fallbacks so they can be overridden at activation time.

[hook]
on-activate = '''
  # LLM server connection
  export LLM_API_BASE="${LLM_API_BASE:-http://localhost:8000/v1}"
  export LLM_API_KEY="${LLM_API_KEY:-sk-local-dev}"
  export LLM_MODEL="${LLM_MODEL:-Llama-3.1-8B-Instruct}"
  export LLM_SYSTEM_PROMPT="${LLM_SYSTEM_PROMPT:-You are a helpful assistant.}"

  # Map to OpenAI SDK env vars
  export OPENAI_BASE_URL="$LLM_API_BASE"
  export OPENAI_API_KEY="$LLM_API_KEY"

  # Python venv setup
  VENV="$FLOX_ENV_CACHE/venv"
  if [ ! -d "$VENV" ]; then
    uv venv "$VENV" --python "$(which python3)"
  fi

  unset PYTHONPATH
  export VIRTUAL_ENV_DISABLE_PROMPT=1
  source "$VENV/bin/activate"

  # Install dependencies on first activation
  if [ ! -f "$VENV/.installed" ]; then
    uv pip install openai rich && touch "$VENV/.installed"
  fi
'''

[profile]
common = '''
  export PATH="$FLOX_ENV_PROJECT:$FLOX_ENV_CACHE/venv/bin:$PATH"
  export VIRTUAL_ENV_DISABLE_PROMPT=1
'''

bash = '''
  unset PYTHONPATH
'''

zsh = '''
  unset PYTHONPATH
'''
